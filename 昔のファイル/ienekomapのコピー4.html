<style>

/* ─── 都市×猫 テーマ（マップ） ─── */

.map-hero{position:relative;padding:16px 16px 44px;border-radius:14px;

@keyframes tailWave{0%,100%{transform:rotate(-14deg)}50%{transform:rotate(18deg)}}
.mascot-ear-l,.mascot-ear-r{transform-origin:center bottom;animation:earTwitch 4.6s ease-in-out infinite}
.mascot-ear-r{animation-delay:.4s}
.mascot-tail{transform-origin:right center;animation:tailWave 2.4s ease-in-out infinite}

<script>
// 2軸パラメトリック猫顔ジェネレーター
// x: 1(公的)..10(私的)   y: 1(半野良)..10(純血家猫)
(function(root){
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function smooth(t){t=clamp(t,0,1);return t*t*(3-2*t);}
function mix(c1,c2,t){return [Math.round(lerp(c1[0],c2[0],t)),Math.round(lerp(c1[1],c2[1],t)),Math.round(lerp(c1[2],c2[2],t))];}
function rgb(c){return 'rgb('+c[0]+','+c[1]+','+c[2]+')';}
function dark(c,f){return [Math.round(c[0]*f),Math.round(c[1]*f),Math.round(c[2]*f)];}
function rng(seed){let s=seed*9301+49297;return function(){s=(s*9301+49297)%233280;return s/233280;};}

// 2026 W杯 出場48か国（国旗絵文字＋配色キット・ロゴ無し版権セーフ）
var KITS={
 ca:{name:'カナダ',flag:'🇨🇦',base:'#d52b1e',trim:'#ffffff'},
 mx:{name:'メキシコ',flag:'🇲🇽',base:'#137a3e',trim:'#ffffff'},
 us:{name:'アメリカ',flag:'🇺🇸',base:'#1c3a8c',trim:'#ffffff'},
 jp:{name:'日本',flag:'🇯🇵',base:'#16307a',trim:'#ffffff'},
 nz:{name:'ニュージーランド',flag:'🇳🇿',base:'#f2f2f2',trim:'#111111'},
 ir:{name:'イラン',flag:'🇮🇷',base:'#f2f2f2',trim:'#1aa44a'},
 ar:{name:'アルゼンチン',flag:'🇦🇷',base:'#ffffff',trim:'#74acdf',stripes:true,stripeCol:'#74acdf'},
 uz:{name:'ウズベキスタン',flag:'🇺🇿',base:'#1f6fc0',trim:'#ffffff'},
 jo:{name:'ヨルダン',flag:'🇯🇴',base:'#c8202e',trim:'#ffffff'},
 kr:{name:'韓国',flag:'🇰🇷',base:'#d4012d',trim:'#ffffff'},

 ec:{name:'エクアドル',flag:'🇪🇨',base:'#ffd400',trim:'#1f3a8c'},
 py:{name:'パラグアイ',flag:'🇵🇾',base:'#ffffff',trim:'#d4012d',stripes:true,stripeCol:'#d4012d'},
 uy:{name:'ウルグアイ',flag:'🇺🇾',base:'#5aa6e6',trim:'#0a2a5e'},
 co:{name:'コロンビア',flag:'🇨🇴',base:'#ffcd00',trim:'#1f3a8c'},
 ma:{name:'モロッコ',flag:'🇲🇦',base:'#c1272d',trim:'#1b7a3c'},
 tn:{name:'チュニジア',flag:'🇹🇳',base:'#e70013',trim:'#ffffff'},

 cd:{name:'コンゴ民主共和国',flag:'🇨🇩',base:'#1f6fc0',trim:'#ffd400'},
 iq:{name:'イラク',flag:'🇮🇶',base:'#f2f2f2',trim:'#1b7a3c'}
};

function catSVG(x,y,seed,kitKey){
  seed=seed||1;
  const nx=clamp((x-1)/9,0,1);      // 0 public .. 1 private
  const ny=clamp((y-1)/9,0,1);      // 0 feral .. 1 housecat
  const r=rng(seed);
  // ---- palette (X: public cool grey -> private warm cream) ----
  const PUB=[150,160,174], PRV=[226,184,128];
  const fur=mix(PUB,PRV,nx);
  const furD=dark(fur,0.80);                 // markings / shadow
  const white=[249,247,241];                 // muzzle / chest
  const patch=[150,110,72];                  // calico brown patch
  const ink='#2b2b2b';
  const innerEar=[246,198,198], earSh=[224,150,150], nose=[232,150,150];
  const cx=150;
  const kit = kitKey && KITS[kitKey];
  const gid='hg'+seed, iid='ir'+seed, eid='eg'+seed;
  const irisCol=mix([120,166,92],[214,150,66],nx); // greenish -> amber
  let s='<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">';
  s+='<defs><radialGradient id="'+gid+'" cx="40%" cy="34%" r="76%">'
    +'<stop offset="0%" stop-color="'+rgb(mix(fur,[255,255,255],0.26))+'"/>'
    +'<stop offset="60%" stop-color="'+rgb(fur)+'"/>'
    +'<stop offset="100%" stop-color="'+rgb(dark(fur,0.84))+'"/></radialGradient>'
    +'<radialGradient id="'+iid+'" cx="40%" cy="34%" r="66%"><stop offset="0%" stop-color="'+rgb(mix(irisCol,[255,255,255],0.55))+'"/><stop offset="52%" stop-color="'+rgb(irisCol)+'"/><stop offset="100%" stop-color="'+rgb(dark(irisCol,0.58))+'"/></radialGradient>'
    +'<radialGradient id="'+eid+'" cx="50%" cy="30%" r="75%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#eef1f6"/></radialGradient></defs>';

  // ===== bust / shoulders (kit = uniform) =====
  const BUST='M36,300 C36,248 92,224 150,224 C208,224 264,248 264,300 Z';
  if(kit){
    s+='<path d="'+BUST+'" fill="'+kit.base+'" stroke="'+ink+'" stroke-width="5"/>';
    if(kit.stripes){
      const cid='jc'+seed;
      s+='<clipPath id="'+cid+'"><path d="'+BUST+'"/></clipPath><g clip-path="url(#'+cid+')">';
      for(let xx=52;xx<268;xx+=30){s+='<rect x="'+xx+'" y="220" width="15" height="88" fill="'+kit.stripeCol+'"/>';}
      s+='</g><path d="'+BUST+'" fill="none" stroke="'+ink+'" stroke-width="5"/>';
    }
    s+='<path d="M124,228 L150,250 L176,228" fill="none" stroke="'+kit.trim+'" stroke-width="7" stroke-linejoin="round"/>';
    s+='<path d="M48,262 Q80,232 112,228" fill="none" stroke="'+kit.trim+'" stroke-width="6"/>';
    s+='<path d="M252,262 Q220,232 188,228" fill="none" stroke="'+kit.trim+'" stroke-width="6"/>';
  } else {
    s+='<path d="'+BUST+'" fill="'+rgb(fur)+'" stroke="'+ink+'" stroke-width="5"/>';
    // white chest bib
    s+='<path d="M150,232 C176,236 188,262 184,300 L116,300 C112,262 124,236 150,232 Z" fill="'+rgb(white)+'"/>';
    if(ny>0.55){ // collar+bell for housecat
      const cw=smooth((ny-0.55)/0.45);
      s+='<path d="M112,240 Q150,260 188,240" fill="none" stroke="'+rgb(mix([210,70,90],[120,90,200],nx))+'" stroke-width="'+(6*cw+2)+'" stroke-linecap="round"/>';
      s+='<circle cx="150" cy="254" r="'+(5*cw+1.5)+'" fill="#ffd84a" stroke="'+ink+'" stroke-width="2"/>';
    }
  }

  // ===== ears =====
  const earUp=lerp(8,18,1-ny); // feral ears more upright/pointed
  function ear(side){
    const baseO=cx+side*92, baseI=cx+side*38;
    const apexX=cx+side*(74+earUp), apexY=14-earUp;
    let p='<path d="M'+baseO+',104 Q'+(cx+side*100)+',58 '+apexX+','+apexY+' Q'+(cx+side*58)+',46 '+baseI+',74 Z" fill="'+rgb(fur)+'" stroke="'+ink+'" stroke-width="5" stroke-linejoin="round"/>';
    p+='<path d="M'+(cx+side*80)+',92 Q'+(cx+side*86)+',64 '+(cx+side*68)+',34 Q'+(cx+side*50)+',56 '+(cx+side*44)+',78 Z" fill="'+rgb(innerEar)+'"/>';
    return p;
  }
  s+=ear(-1)+ear(1);

  // ===== head =====
  const HEAD='M150,44 C232,44 250,104 248,150 C246,200 206,232 150,232 C94,232 54,200 52,150 C50,104 68,44 150,44 Z';
  s+='<path d="'+HEAD+'" fill="url(#'+gid+')" stroke="'+ink+'" stroke-width="5" stroke-linejoin="round"/>';

  // ===== coat markings (clipped to head) =====
  const cidH='hd'+seed;
  s+='<clipPath id="'+cidH+'"><path d="'+HEAD+'"/></clipPath><g clip-path="url(#'+cidH+')">';
  const style=seed%3; // 0 calico, 1 tabby, 2 plain+white
  if(style===0){ // calico: brown patch over one upper side + ear-side
    const sd=(seed%2)?1:-1;
    s+='<path d="M'+cx+',44 C'+(cx+sd*70)+',44 '+(cx+sd*100)+',70 '+(cx+sd*96)+',120 C'+(cx+sd*70)+',150 '+(cx+sd*30)+',120 '+cx+',92 Z" fill="'+rgb(patch)+'"/>';
    s+='<ellipse cx="'+(cx-sd*70)+'" cy="186" rx="34" ry="26" fill="'+rgb(patch)+'" opacity="0.9"/>';
  } else if(style===1){ // tabby stripes (forehead + cheeks)
    s+='<g stroke="'+rgb(furD)+'" stroke-width="7" stroke-linecap="round" fill="none">';
    s+='<path d="M150,52 L150,86"/><path d="M132,56 Q126,72 122,90"/><path d="M168,56 Q174,72 178,90"/>';
    s+='<path d="M60,150 q22,6 40,2"/><path d="M60,170 q24,6 42,0"/>';

  [2,4,6,8,10].forEach(r=>{s+='<path d="'+poly(r)+'" fill="none" stroke="'+(r===10?'#9aa6bd':'#e1e6f0')+'" stroke-width="'+(r===10?2:1)+'"/>';});

  s+='<path d="'+poly(0)+'" fill="none"/>';

  s+='<path d="'+dp+'" fill="rgba(192,0,0,.20)" stroke="#C00000" stroke-width="2.5" stroke-linejoin="round"/>';

  // labels
  for(let i=0;i<8;i++){const a=ang(i),lx=cx+(R+26)*Math.cos(a),ly=cy+(R+26)*Math.sin(a);
    let anc='middle'; if(Math.cos(a)>0.4)anc='start'; else if(Math.cos(a)<-0.4)anc='end';
